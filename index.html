<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-title" content="Watch Log">
<meta name="theme-color" content="#10121C">
<title>Watch Log</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#10121C;
    --surface:#1B1E2E;
    --surface-2:#242840;
    --amber:#F2A93B;
    --teal:#4FD1C5;
    --text:#EDEDF2;
    --muted:#8A8DA0;
    --danger:#E0616B;
    --radius:16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  [data-theme="light"]{
    --bg:#F5F3EE;
    --surface:#FFFFFF;
    --surface-2:#EDEAE2;
    --amber:#D98A1F;
    --teal:#2A9D93;
    --text:#211E1C;
    --muted:#767268;
    --danger:#C74450;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif;
    overscroll-behavior-y:none;
    -webkit-user-select:none; user-select:none;
    transition:background 0.2s, color 0.2s;
  }
  input, textarea{ -webkit-user-select:text; user-select:text; }
  .display{font-family:'Bebas Neue',sans-serif; letter-spacing:0.03em;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  #app{ max-width:560px; margin:0 auto; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }

  header.top{
    padding: calc(var(--safe-top) + 14px) 18px 12px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(27,30,46,0.55);
    backdrop-filter:blur(20px) saturate(160%); -webkit-backdrop-filter:blur(20px) saturate(160%);
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  [data-theme="light"] header.top{ background:rgba(255,255,255,0.55); }
  header.top .brand{ display:flex; align-items:center; gap:10px;}
  header.top .dot{ width:10px;height:10px;border-radius:50%; background:var(--amber); box-shadow:0 0 12px var(--amber);}
  header.top h1{ font-size:28px; margin:0; font-weight:400;}
  header.top .gear{ background:none;border:none;color:var(--muted); font-size:20px; padding:8px;}

  .ticker{ padding:10px 18px 14px; display:flex; gap:18px; overflow-x:auto; border-bottom:1px solid rgba(255,255,255,0.06);}
  .ticker .stat{ flex:none; }
  .ticker .stat .n{ font-family:'Bebas Neue'; font-size:22px; color:var(--amber);}
  .ticker .stat .l{ font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted);}

  main{ flex:1; overflow-y:auto; padding: 14px 14px calc(96px + var(--safe-bottom)); }

  .empty{ text-align:center; color:var(--muted); padding:60px 20px; }
  .empty .big{ font-size:40px; margin-bottom:8px; }

  .card{
    background:var(--surface); border-radius:var(--radius); padding:12px;
    display:flex; gap:12px; margin-bottom:10px; align-items:center;
    border:1px solid rgba(255,255,255,0.04);
  }
  button.card{ width:100%; font-family:'Inter'; color:var(--text); text-align:left; cursor:pointer; }

  .section-label{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin:0 0 10px;}

  .list-group{ background:var(--surface); border-radius:16px; overflow:hidden; margin-bottom:16px; border:1px solid rgba(255,255,255,0.04); box-shadow:0 6px 20px rgba(0,0,0,0.18);}
  .list-row{ position:relative; overflow:hidden; border-bottom:1px solid rgba(255,255,255,0.06);}
  .list-row:last-child{ border-bottom:none;}
  .row-swipe-bg{ position:absolute; inset:0; display:flex; align-items:center; justify-content:space-between; padding:0 20px; opacity:0;}
  .row-swipe-bg .swipe-label{ font-size:12px; font-weight:700; display:flex; align-items:center; gap:5px;}
  .row-swipe-bg .swipe-label.left{ color:var(--amber);}
  .row-swipe-bg .swipe-label.right{ color:var(--danger);}
  .row-swipe-inner{ display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--surface); position:relative; touch-action:pan-y;}
  .list-row .rowmain{ display:flex; align-items:center; gap:12px; flex:1; min-width:0; background:none; border:none; padding:0; text-align:left; font-family:'Inter'; color:var(--text); cursor:pointer; transition:opacity 0.1s;}
  .list-row .rowmain:active{ opacity:0.6;}
  .list-row .poster-wrap{ position:relative; flex:none;}
  .list-row .poster{ width:48px; height:68px; border-radius:8px;}
  .list-row .count-badge{ position:absolute; top:-5px; right:-5px; width:18px; height:18px; border-radius:50%; background:var(--amber); color:#1a1204; font-size:9px; font-weight:700; display:flex; align-items:center; justify-content:center; border:2px solid var(--surface);}
  .list-row .rinfo{ flex:1; min-width:0;}
  .list-row .rinfo h3{ margin:0 0 3px; font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .list-row .rsub{ font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .check-btn{ width:32px; height:32px; border-radius:50%; border:2px solid var(--amber); background:none; color:var(--amber); display:flex; align-items:center; justify-content:center; flex:none; font-size:14px; font-weight:700; transition:transform 0.1s;}
  .check-btn:active{ transform:scale(0.85);}
  .check-btn.done{ border-color:var(--teal); color:var(--teal);}
  .chevron{ color:var(--muted); font-size:20px; flex:none; padding:0 2px; font-family:'Inter';}
  .poster{ width:52px; height:74px; border-radius:8px; background:var(--surface-2) center/cover no-repeat; flex:none; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:11px;}
  .card .info{ flex:1; min-width:0; background:none; border:none; padding:0; text-align:left; font-family:'Inter'; color:var(--text); cursor:pointer; }
  .card.clickable{ cursor:pointer; }
  .card .info h3{ margin:0 0 4px; font-size:16px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .card .info .sub{ font-size:12px; color:var(--muted); display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .progress-bar{ height:4px; background:var(--surface-2); border-radius:2px; margin-top:6px; overflow:hidden;}
  .progress-bar > div{ height:100%; background:var(--amber); }
  .card .actions{ display:flex; flex-direction:column; gap:6px; flex:none;}
  .iconbtn{ background:var(--surface-2); border:none; color:var(--text); width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center;}
  .iconbtn.amber{ background:var(--amber); color:#1a1204;}

  nav.bottom{
    position:fixed; left:12px; right:12px; bottom: calc(10px + var(--safe-bottom)); max-width:536px; margin:0 auto;
    background:rgba(27,30,46,0.5); backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:22px;
    padding: 6px; box-shadow:0 8px 28px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
    display:flex; justify-content:space-around; overflow-x:auto;
  }
  [data-theme="light"] nav.bottom{ background:rgba(255,255,255,0.5); border-color:rgba(0,0,0,0.08); box-shadow:0 8px 28px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.6); }
  [data-theme="light"] .sheet-head button{ background:rgba(0,0,0,0.06); border-color:rgba(0,0,0,0.1);}
  [data-theme="light"] .segmented{ background:rgba(0,0,0,0.05); border-color:rgba(0,0,0,0.08);}
  nav.bottom button{
    background:none; border:none; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:9.5px; padding:7px 6px; flex:1; min-width:48px; border-radius:15px; font-weight:600;
  }
  nav.bottom button.active{ color:#1a1204; background:linear-gradient(145deg, var(--amber), #d98f2a); box-shadow:0 2px 8px rgba(242,169,59,0.4), inset 0 1px 0 rgba(255,255,255,0.35);}
  nav.bottom button{ transition:transform 0.1s;}
  nav.bottom button:active{ transform:scale(0.9);}
  nav.bottom svg{ width:20px; height:20px; }

  .segmented{ display:flex; gap:6px; margin-bottom:14px; background:rgba(255,255,255,0.06); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:4px; }
  .segmented button{ flex:1; padding:9px; border:none; background:none; color:var(--muted); font-size:12.5px; font-weight:600; border-radius:10px; font-family:'Inter'; transition:transform 0.1s;}
  .segmented button:active{ transform:scale(0.95);}
  .segmented button.active{ background:linear-gradient(145deg, var(--amber), #d98f2a); color:#1a1204; box-shadow:0 2px 8px rgba(242,169,59,0.35), inset 0 1px 0 rgba(255,255,255,0.3);}

  .upcoming-card{ background:var(--surface); border-radius:var(--radius); padding:12px; display:flex; gap:12px; margin-bottom:10px; align-items:center; border:1px solid rgba(255,255,255,0.04);}
  .upcoming-card .info{ flex:1; min-width:0; }
  .upcoming-card .info h3{ margin:0 0 4px; font-size:15px; font-weight:600;}
  .upcoming-card .airtime{ font-size:12.5px; color:var(--amber); font-weight:600;}
  .upcoming-card .statustag{ font-size:11px; color:var(--muted); margin-top:2px;}
  .badge-ended{ display:inline-block; font-size:10px; padding:2px 7px; border-radius:20px; background:rgba(224,97,107,0.15); color:var(--danger); font-weight:600;}
  .badge-tbd{ display:inline-block; font-size:10px; padding:2px 7px; border-radius:20px; background:rgba(138,141,160,0.2); color:var(--muted); font-weight:600;}
  .provider-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;}
  .provider-chip{ display:flex; align-items:center; gap:6px; background:var(--surface-2); padding:6px 10px; border-radius:20px; font-size:12px;}
  .provider-chip img{ width:18px; height:18px; border-radius:4px; display:block;}
  .src-tag{ font-family:'IBM Plex Mono'; font-size:9.5px; color:var(--muted); border:1px solid rgba(255,255,255,0.15); padding:1px 5px; border-radius:5px; margin-left:2px;}
  .stale-banner{ background:rgba(242,169,59,0.1); border:1px solid rgba(242,169,59,0.3); border-radius:12px; padding:10px 12px; font-size:12px; color:var(--muted); margin-top:12px; line-height:1.5;}
  .stale-banner button{ background:none; border:none; color:var(--amber); font-weight:700; font-size:12px; padding:0; margin-top:4px; display:block;}
  .poster-wrap{ position:relative; flex:none;}
  .mini-badge{ position:absolute; top:-5px; right:-5px; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; border:2px solid var(--bg);}
  .mini-badge.added{ background:var(--teal); color:#06231f;}
  .mini-badge.add{ background:var(--amber); color:#1a1204;}
  .rating-tag{ font-size:11px; color:var(--amber); font-weight:700; flex:none; margin-right:2px;}
  .recap-stat{ text-align:center; margin-bottom:16px;}
  .recap-num{ font-family:'Bebas Neue'; font-size:38px; color:var(--amber); line-height:1;}
  .recap-label{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-top:4px;}

  .discover-section{ margin-top:6px; }
  .discover-section h4{ font-family:'Bebas Neue'; font-size:17px; font-weight:400; color:var(--amber); margin:16px 0 8px;}
  .genre-chip{ background:var(--surface-2); border:none; color:var(--text); padding:8px 14px; border-radius:20px; font-size:12.5px; font-weight:600; margin:0 6px 6px 0; font-family:'Inter';}
  .discover-header{ display:flex; align-items:center; justify-content:space-between; margin:16px 0 8px;}
  .discover-header h4{ font-family:'Bebas Neue'; font-size:17px; font-weight:400; color:var(--amber); margin:0;}
  .discover-header button{ background:none; border:none; color:var(--amber); font-size:12px; font-weight:600; font-family:'Inter'; padding:4px;}
  .discover-row{ display:flex; gap:10px; overflow-x:auto; padding:2px 2px 6px; -webkit-overflow-scrolling:touch;}
  .discover-thumb{ flex:none; width:76px; background:none; border:none; text-align:left; font-family:'Inter'; color:var(--text); padding:0;}
  .discover-thumb .poster{ width:76px; height:108px; margin-bottom:5px;}
  .discover-thumb .dtitle{ font-size:11px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}

  .fab{
    position:fixed; right:20px; bottom: calc(84px + var(--safe-bottom)); max-width:560px;
    width:56px; height:56px; border-radius:50%; background:linear-gradient(145deg, rgba(242,169,59,0.92), rgba(217,143,42,0.88)); color:#1a1204;
    border:1px solid rgba(255,255,255,0.35); font-size:28px; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:0 8px 22px rgba(242,169,59,0.4), inset 0 1px 1px rgba(255,255,255,0.5); transition:transform 0.12s;
  }
  .fab:active{ transform:scale(0.92);}

  .sheet-overlay{ position:fixed; inset:0; height:100vh; height:100dvh; background:rgba(0,0,0,0.55); display:none; align-items:flex-end; z-index:50; }
  .sheet-overlay.open{ display:flex; }
  .sheet{
    background:var(--bg); width:100%; max-width:560px; margin:0 auto; border-radius:22px 22px 0 0;
    max-height:88vh; max-height:88dvh; display:flex; flex-direction:column; padding-bottom:calc(16px + var(--safe-bottom));
    border-top:1px solid rgba(255,255,255,0.14); border-left:1px solid rgba(255,255,255,0.08); border-right:1px solid rgba(255,255,255,0.08);
    box-shadow:0 -8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .sheet .handle{ width:36px; height:4px; background:rgba(255,255,255,0.25); border-radius:2px; margin:10px auto; flex:none;}
  .sheet-head{
    display:flex; align-items:center; justify-content:space-between; padding:6px 18px 12px; flex:none;
    background:linear-gradient(180deg, rgba(242,169,59,0.07), transparent);
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .sheet-head h2{ font-family:'Bebas Neue'; font-size:24px; font-weight:400; margin:0;}
  .sheet-head button{ background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); color:var(--text); font-size:13px; padding:6px 14px; border-radius:14px; font-weight:600;}
  .sheet-body{ overflow-y:auto; padding:14px 18px 18px; flex:1; min-height:0;}

  input[type=text], input[type=file], input[type=date]{
    width:100%; background:var(--surface); border:1px solid rgba(255,255,255,0.08); color:var(--text);
    padding:12px 14px; border-radius:12px; font-size:15px; font-family:'Inter';
  }
  .search-sort-bar{ padding:0 14px 10px; display:flex; gap:8px;}
  .search-sort-bar input{ flex:1; background:var(--surface); border:1px solid rgba(255,255,255,0.08); color:var(--text); padding:9px 12px; border-radius:12px; font-size:13.5px; font-family:'Inter';}
  .search-sort-bar select{ flex:none; width:auto; padding:9px 8px; font-size:12px;}
  .global-search-btn{ flex:none; width:36px; height:36px; border-radius:12px; background:var(--surface); border:1px solid rgba(255,255,255,0.08); font-size:14px; display:flex; align-items:center; justify-content:center; padding:0;}
  select{
    width:100%; background:var(--surface); border:1px solid rgba(255,255,255,0.08); color:var(--text);
    padding:10px 12px; border-radius:12px; font-size:14px; font-family:'Inter';
  }
  label.field-label{ font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); display:block; margin:14px 0 6px;}

  .search-result{ display:flex; gap:12px; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); width:100%; background:none; border:none; border-bottom:1px solid rgba(255,255,255,0.05); font-family:'Inter'; color:var(--text); text-align:left; cursor:pointer; }
  .search-result .poster{ width:44px; height:62px;}
  .search-result .info{ flex:1; }
  .search-result .info h4{ margin:0 0 2px; font-size:15px;}
  .search-result .info span{ font-size:12px; color:var(--muted);}
  .search-result .info .overview-line{ font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}

  .status-row{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .status-chip{
    flex:1; min-width:80px; text-align:center; padding:12px 8px; border-radius:12px; background:var(--surface);
    border:1px solid rgba(255,255,255,0.08); font-size:13px; font-weight:600; color:var(--muted);
    font-family:'Inter'; cursor:pointer;
  }
  .status-chip.sel{ background:var(--amber); color:#1a1204; border-color:var(--amber);}

  .season-block{ margin-top:16px;}
  .season-block h4{ font-family:'Bebas Neue'; font-size:19px; font-weight:400; margin:0; color:var(--amber);}
  .season-toggle{ width:100%; display:flex; align-items:center; justify-content:space-between; background:none; border:none; padding:4px 0; cursor:pointer;}
  .season-chevron{ color:var(--amber); font-size:14px; flex:none;}
  .ep-row{ display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); width:100%; background:none; border:none; border-bottom:1px solid rgba(255,255,255,0.04); font-family:'Inter'; text-align:left; cursor:pointer; }
  .ep-row .check{ width:26px; height:26px; border-radius:50%; border:2px solid var(--muted); flex:none; display:flex; align-items:center; justify-content:center;}
  .ep-row .check.done{ background:var(--teal); border-color:var(--teal); color:#06231f;}
  .ep-row .etext{ flex:1; min-width:0;}
  .ep-row .etext .t1{ font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .ep-row .etext .t2{ font-size:11px; color:var(--muted); font-family:'IBM Plex Mono';}

  .detail-hero{ display:flex; gap:14px; align-items:flex-start; }
  .detail-hero .poster{ width:88px; height:124px; border-radius:10px;}
  .detail-hero h2{ font-family:'Bebas Neue'; font-size:26px; font-weight:400; margin:0 0 4px;}
  .detail-hero .meta{ font-size:12px; color:var(--muted);}

  .btnrow{ display:flex; gap:8px; margin-top:14px;}
  .btn{ flex:1; padding:12px; border-radius:12px; border:none; font-weight:600; font-size:13px; text-align:center;}
  .btn.primary{ background:var(--amber); color:#1a1204;}
  .btn.ghost{ background:var(--surface); color:var(--text); border:1px solid rgba(255,255,255,0.1);}
  .btn.danger{ background:transparent; color:var(--danger); border:1px solid rgba(224,97,107,0.4);}

  .toast{
    position:fixed; left:50%; transform:translateX(-50%); bottom: calc(150px + var(--safe-bottom)); max-width:80%;
    background:var(--surface-2); color:var(--text); padding:10px 16px; border-radius:30px; font-size:13px;
    box-shadow:0 8px 24px rgba(0,0,0,0.4); z-index:80; opacity:0; transition:opacity 0.25s, transform 0.25s; pointer-events:none;
    border:1px solid rgba(255,255,255,0.08);
  }
  .toast.show{ opacity:1; }

  .import-step{ margin-top:12px; }
  .map-row{ display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .map-row label{ width:110px; font-size:12px; color:var(--muted); flex:none;}
  .import-log{ font-family:'IBM Plex Mono'; font-size:11.5px; color:var(--muted); background:var(--surface); border-radius:10px; padding:10px; max-height:140px; overflow-y:auto; margin-top:10px; white-space:pre-wrap;}
  .import-log .ok{ color:var(--teal);}
  .import-log .fail{ color:var(--danger);}

  .spinner{ width:16px;height:16px;border-radius:50%; border:2px solid rgba(255,255,255,0.2); border-top-color:var(--amber); animation:spin 0.7s linear infinite; display:inline-block; vertical-align:middle;}
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .rating-row{ display:flex; gap:6px; margin-top:8px;}
  .rating-row button{ background:var(--surface); border:1px solid rgba(255,255,255,0.08); color:var(--muted); width:36px; height:36px; border-radius:50%; font-size:14px;}
  .rating-row button.on{ background:var(--amber); color:#1a1204; border-color:var(--amber);}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="brand"><span class="dot"></span><h1 class="display">WATCH LOG</h1></div>
    <div style="display:flex;align-items:center;gap:4px;">
      <button class="gear" id="logHeaderBtn" onclick="switchTab('log')" title="Log"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:19px;height:19px;"><line x1="4" y1="20" x2="20" y2="20"/><rect x="6" y="12" width="3" height="8"/><rect x="11" y="7" width="3" height="13"/><rect x="16" y="3" width="3" height="17"/></svg></button>
      <button class="gear" onclick="openSettings()">⋯</button>
    </div>
  </header>
  <div class="ticker" id="ticker"></div>
  <div id="librarySearchWrap"></div>
  <main id="main"></main>
  <button class="fab" onclick="openSearch()">+</button>
  <nav class="bottom" id="bottomNav"></nav>
</div>

<div class="sheet-overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ---------------- STATE ---------------- */
const STORE_KEY = 'watchlog_data_v1';
let state = loadState();
let currentTab = 'watching';
let librarySearchQuery = '';
let librarySortMode = 'recent';
let watchingSubview = 'mylist'; // 'mylist' | 'upcoming'
let caughtUpCollapsed = true;
const TABS = [
  {id:'watching', label:'Watching', icon:'play'},
  {id:'later', label:'Later', icon:'clock'},
  {id:'want', label:'Want', icon:'star'},
  {id:'completed', label:'Done', icon:'check'},
  {id:'stopped', label:'Stopped', icon:'pause'},
];

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { shows: [] };
}
function saveState(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    return true;
  }catch(e){
    console.error('Storage save failed', e);
    return false;
  }
}
function uid(){ return 'x'+Math.random().toString(36).slice(2,10)+Date.now().toString(36); }

/* ---------------- THEME ---------------- */
function currentThemeSetting(){ return (state.settings && state.settings.theme) || 'auto'; }
function applyTheme(){
  const setting = currentThemeSetting();
  let resolved = setting;
  if(setting==='auto'){
    resolved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
  }
  if(resolved==='light'){
    document.documentElement.setAttribute('data-theme','light');
    document.querySelector('meta[name="theme-color"]').setAttribute('content', '#F5F3EE');
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.querySelector('meta[name="theme-color"]').setAttribute('content', '#10121C');
  }
}
function setTheme(mode){
  state.settings = state.settings || {};
  state.settings.theme = mode;
  saveState();
  applyTheme();
}
if(window.matchMedia){
  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', ()=>{
    if(currentThemeSetting()==='auto') applyTheme();
  });
}

/* ---------------- ICONS ---------------- */
const ICONS = {
  play:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/></svg>',
  star:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,3 15,10 22,10 16.5,14.5 18.5,21 12,17 5.5,21 7.5,14.5 2,10 9,10"/></svg>',
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
  pause:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><line x1="10" y1="9" x2="10" y2="15"/><line x1="14" y1="9" x2="14" y2="15"/></svg>',
  chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="20" x2="20" y2="20"/><rect x="6" y="12" width="3" height="8"/><rect x="11" y="7" width="3" height="13"/><rect x="16" y="3" width="3" height="17"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/></svg>',
};

/* ---------------- TOAST ---------------- */
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---------------- NAV RENDER ---------------- */
function renderNav(){
  const nav = document.getElementById('bottomNav');
  nav.innerHTML = TABS.map(t=>`
    <button class="${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">
      ${ICONS[t.icon]}<span>${t.label}</span>
    </button>`).join('');
  const logBtn = document.getElementById('logHeaderBtn');
  if(logBtn) logBtn.style.color = currentTab==='log' ? 'var(--amber)' : '';
}
function switchTab(id){
  currentTab = id;
  librarySearchQuery = '';
  renderNav();
  renderSearchBar();
  renderMain();
  if(id==='watching') autoRefreshWatchingOnce();
}
function renderSearchBar(){
  const wrap = document.getElementById('librarySearchWrap');
  if(!wrap) return;
  if(currentTab==='log'){ wrap.innerHTML=''; return; } // Log already has its own "all-time history" framing
  wrap.innerHTML = `
    <div class="search-sort-bar">
      <input type="text" id="librarySearchInput" placeholder="Filter this list…" oninput="onLibrarySearchInput(this.value)">
      <select onchange="onLibrarySortChange(this.value)">
        <option value="recent" ${librarySortMode==='recent'?'selected':''}>Recently Updated</option>
        <option value="added" ${librarySortMode==='added'?'selected':''}>Recently Added</option>
        <option value="az" ${librarySortMode==='az'?'selected':''}>A–Z</option>
        <option value="rating" ${librarySortMode==='rating'?'selected':''}>Highest Rated</option>
      </select>
      <button type="button" class="global-search-btn" onclick="openGlobalSearch()" title="Search your whole library">🔍</button>
    </div>`;
}
function onLibrarySearchInput(v){ librarySearchQuery = v; renderMain(); }
function onLibrarySortChange(v){ librarySortMode = v; renderMain(); }
function matchesLibrarySearch(title){
  return !librarySearchQuery || title.toLowerCase().includes(librarySearchQuery.toLowerCase());
}
// Quietly checks Watching shows for new episodes once per session (triggered on load, and
// a Safari page reload/pull-to-refresh counts as a fresh load too). Uses checkForNewEpisodesSafely,
// which only ever adds new episodes — it can't touch or reset anything that already exists.
let watchingAutoRefreshed = false;
async function autoRefreshWatchingOnce(){
  if(watchingAutoRefreshed) return;
  watchingAutoRefreshed = true;
  const shows = state.shows.filter(s=>s.status==='watching' && s.seasonsLoaded);
  let anyChanged = false;
  for(const show of shows){
    let result;
    try{ result = await checkForNewEpisodesSafely(show); }catch(e){ continue; }
    if(result.error) continue;
    if(result.newCount>0 || result.statusChanged || result.capIncreased) anyChanged = true;
  }
  if(anyChanged){
    saveState();
    if(currentTab==='watching') renderMain();
  }
}
function sortShows(list){
  const copy = list.slice();
  switch(librarySortMode){
    case 'added': return copy.sort((a,b)=> (b.addedAt||0)-(a.addedAt||0));
    case 'az': return copy.sort((a,b)=> a.title.localeCompare(b.title));
    case 'rating': return copy.sort((a,b)=> (b.rating||0)-(a.rating||0));
    default: return copy.sort((a,b)=> (b.updatedAt||0)-(a.updatedAt||0));
  }
}

/* ---------------- TICKER ---------------- */
// Shared everywhere watch time is displayed — always breaks down to the most readable
// combination of units instead of leaving a big raw hour count once totals get large.
function formatWatchTime(totalHours){
  if(totalHours>=720){
    const months = Math.floor(totalHours/720);
    const remainder = totalHours%720;
    const days = Math.floor(remainder/24);
    const hours = remainder%24;
    return days>0 ? `${months}mo ${days}d` : (hours>0? `${months}mo ${hours}h` : `${months}mo`);
  }
  const days = Math.floor(totalHours/24);
  const rem = totalHours%24;
  return days>0 ? `${days}d ${rem}h` : `${rem}h`;
}
function renderTicker(){
  const all = state.shows;
  let episodesWatched = 0, minutes = 0, showsDone = 0;
  all.forEach(s=>{
    (s.seasons||[]).forEach(se=> se.episodes.forEach(ep=>{
      if(ep.watched){ episodesWatched++; minutes += (s.runtime||42); }
    }));
  });
  const totalHours = Math.floor(minutes/60);
  const timeLabel = formatWatchTime(totalHours);
  const el = document.getElementById('ticker');
  el.innerHTML = `
    <div class="stat"><div class="n">${all.length}</div><div class="l">Shows</div></div>
    <div class="stat"><div class="n">${episodesWatched}</div><div class="l">Episodes</div></div>
    <div class="stat"><div class="n">${timeLabel}</div><div class="l">Watch time</div></div>
    <div class="stat"><div class="n">${all.filter(s=>s.status==='watching').length}</div><div class="l">In progress</div></div>
  `;
}

/* ---------------- MAIN RENDER ---------------- */
// A season's "aired cap" is the highest episode number known to have aired.
// Falls back to the full episode count for shows added before this existed.
function seasonCap(se){ return (se.airedThrough!=null)? se.airedThrough : se.episodes.length; }
function watchedCount(show){
  let w=0,t=0;
  (show.seasons||[]).forEach(se=>{
    if(se.skipped) return;
    const cap = seasonCap(se);
    se.episodes.forEach(ep=>{
      if(ep.number>cap) return; // not aired yet — don't count as available
      t++; if(ep.watched) w++;
    });
  });
  return {w,t};
}
function posterDiv(show){
  if(show.poster) return `<div class="poster" style="background-image:url('${show.poster}')"></div>`;
  return `<div class="poster">No Art</div>`;
}

function renderMain(){
  renderTicker();
  const main = document.getElementById('main');
  if(currentTab==='log'){ renderLog(main); return; }
  if(currentTab==='watching'){ renderWatchingTab(main); return; }
  if(currentTab==='stopped'){ renderStoppedTab(main); return; }
  const allInTab = state.shows.filter(s=>s.status===currentTab);
  const shows = sortShows(allInTab.filter(s=>matchesLibrarySearch(s.title)));
  if(shows.length===0){
    main.innerHTML = allInTab.length>0
      ? `<div class="empty"><div class="big">·</div>No matches for "${escapeHtml(librarySearchQuery)}".</div>`
      : `<div class="empty"><div class="big">·</div>Nothing here yet.<br><span style="font-size:12px">Add a show, or</span><br><button type="button" onclick="openSearch()" style="margin-top:10px;background:var(--amber);color:#1a1204;border:none;padding:9px 18px;border-radius:20px;font-weight:700;font-size:13px;">Browse Discover</button></div>`;
    return;
  }
  main.innerHTML = `<div class="list-group">` + shows.map(s=>{
    const {t} = watchedCount(s);
    let sub;
    if(currentTab==='completed'){
      sub = `${t} episode${t!==1?'s':''} · Completed`;
    } else if(s.seasonsLoaded){
      const r = remainingCount(s);
      sub = `${r} episode${r!==1?'s':''} to watch`;
    } else {
      sub = `${s.premiered? s.premiered.slice(0,4):''}${s.network? ' · '+s.network:''}`;
    }
    return libraryRowHtml(s, sub);
  }).join('') + `</div>`;
  if(currentTab==='want' || currentTab==='later'){
    enhanceLibraryRowsWithEpisodeCounts(shows.filter(s=>!s.seasonsLoaded), currentTab);
  }
}
// For shows whose episode data hasn't been fetched yet, load it in the background and
// fill in the real "N episodes to watch" count once known — cached permanently afterward.
async function enhanceLibraryRowsWithEpisodeCounts(unloaded, tab){
  for(const s of unloaded){
    if(currentTab!==tab) return; // bail if the user navigated away
    try{ await ensureEpisodes(s); }catch(e){ continue; }
    if(currentTab!==tab) return;
    const r = remainingCount(s);
    const el = document.querySelector(`[data-rowsub="${s.id}"]`);
    if(el) el.textContent = `${r} episode${r!==1?'s':''} to watch`;
  }
}
// A plain, fully-tappable library row: poster, title, subtitle, disclosure chevron —
// used anywhere a show doesn't need its own quick-action button (unlike Watching's checkmark).
function openGlobalSearch(){
  openSheet(`
    <div class="handle"></div>
    <div class="sheet-head"><h2>Search Library</h2><button onclick="closeSheet()">Done</button></div>
    <div class="sheet-body">
      <input type="text" id="globalSearchInput" placeholder="Search all your shows…" oninput="renderGlobalSearchResults(this.value)">
      <div id="globalSearchResults" style="margin-top:14px;"></div>
    </div>
  `);
  renderGlobalSearchResults('');
}
function renderGlobalSearchResults(q){
  const box = document.getElementById('globalSearchResults');
  if(!box) return;
  const query = q.trim().toLowerCase();
  if(!query){
    box.innerHTML = `<div class="empty" style="padding:20px 10px;">Start typing to search across your whole library, no matter which tab it's in.</div>`;
    return;
  }
  const statusLabels = {watching:'Watching', later:'Later', want:'Want to Watch', completed:'Completed', stopped:'Stopped'};
  const matches = state.shows.filter(s=>s.title.toLowerCase().includes(query));
  if(!matches.length){
    box.innerHTML = `<div class="empty">No matches for "${escapeHtml(q)}".</div>`;
    return;
  }
  box.innerHTML = `<div class="list-group">` + matches.map(s=>libraryRowHtml(s, statusLabels[s.status]||s.status)).join('') + `</div>`;
}
function libraryRowHtml(show, subtitleText, dimmed){
  const rightLabel = nextUnwatched(show) ? '✓ Log' : (show.status!=='watching' ? '▶ Watching' : '');
  return `
    <div class="list-row" data-showid="${show.id}" style="${dimmed?'opacity:0.55;':''}">
      <div class="row-swipe-bg">
        <span class="swipe-label left">${rightLabel}</span>
        <span class="swipe-label right">✕ Remove</span>
      </div>
      <div class="row-swipe-inner">
        <button class="rowmain" onclick="openDetail('${show.id}')" style="flex:1;">
          <div class="poster-wrap">${posterDiv(show)}</div>
          <div class="rinfo">
            <h3>${escapeHtml(show.title)}</h3>
            <div class="rsub" data-rowsub="${show.id}">${subtitleText}</div>
          </div>
        </button>
        ${show.rating>0? `<div class="rating-tag">★ ${show.rating}</div>`:''}
        <div class="chevron">›</div>
      </div>
    </div>`;
}
// Classifies a show's progress regardless of its stored status — used to group the
// Stopped tab (and could apply anywhere) into meaningful sections rather than a flat list.
function categorizeProgress(show){
  const {w,t} = watchedCount(show);
  const hasEnded = show.lifecycleStatus && /ended|canceled|cancelled/i.test(show.lifecycleStatus);
  if(nextUnwatched(show)) return 'remaining';
  if(t>0 && w===t && hasEnded) return 'complete';
  return 'caughtup';
}
function renderStoppedTab(main){
  const allStopped = state.shows.filter(s=>s.status==='stopped');
  const shows = sortShows(allStopped.filter(s=>matchesLibrarySearch(s.title)));
  if(shows.length===0){
    main.innerHTML = allStopped.length>0
      ? `<div class="empty"><div class="big">·</div>No matches for "${escapeHtml(librarySearchQuery)}".</div>`
      : `<div class="empty"><div class="big">·</div>Nothing here yet.<br><span style="font-size:12px">Add a show, or</span><br><button type="button" onclick="openSearch()" style="margin-top:10px;background:var(--amber);color:#1a1204;border:none;padding:9px 18px;border-radius:20px;font-weight:700;font-size:13px;">Browse Discover</button></div>`;
    return;
  }
  const remaining = shows.filter(s=>categorizeProgress(s)==='remaining');
  const caughtUp = shows.filter(s=>categorizeProgress(s)==='caughtup');
  const complete = shows.filter(s=>categorizeProgress(s)==='complete');
  let html = '';
  const section = (title, list, dim, subtitleFn)=>{
    if(!list.length) return '';
    return `<div class="section-label" style="margin-top:${html?'18px':'0'}">${title} · ${list.length}</div>` +
      `<div class="list-group">` + list.map(s=>libraryRowHtml(s, subtitleFn(s), dim)).join('') + `</div>`;
  };
  html += section('Episodes Remaining', remaining, false, s=>{ const r=remainingCount(s); return `${r} episode${r!==1?'s':''} left`; });
  html += section('Caught Up', caughtUp, true, s=>'Caught up');
  html += section('Complete', complete, true, s=>{ const {t}=watchedCount(s); return `${t} episode${t!==1?'s':''} · Complete`; });
  main.innerHTML = html;
}
function remainingCount(show){
  let remaining=0;
  (show.seasons||[]).forEach(se=>{
    if(se.skipped) return;
    const cap = seasonCap(se);
    se.episodes.forEach(ep=>{ if(ep.number<=cap && !ep.watched) remaining++; });
  });
  return remaining;
}
function renderWatchingTab(main){
  const allWatching = state.shows.filter(s=>s.status==='watching');
  const shows = allWatching.filter(s=>matchesLibrarySearch(s.title));
  const headerHtml = `
    <div class="segmented">
      <button class="${watchingSubview==='mylist'?'active':''}" onclick="setWatchingSubview('mylist')">My Shows</button>
      <button class="${watchingSubview==='upcoming'?'active':''}" onclick="setWatchingSubview('upcoming')">Upcoming</button>
    </div>
    ${watchingSubview==='mylist' && allWatching.length>0 ? `<button type="button" class="btn ghost" style="width:100%;margin-bottom:12px;font-size:12.5px;padding:8px;" onclick="refreshAllWatching()">↻ Check all Watching shows for new episodes</button>` : ''}
  `;
  if(watchingSubview==='mylist'){
    renderWatchingMyList(shows, main, headerHtml, allWatching.length);
  } else {
    main.innerHTML = headerHtml + `<div style="text-align:center;padding:30px;"><span class="spinner"></span></div>`;
    renderUpcoming(shows, main, headerHtml);
  }
}
async function refreshAllWatching(){
  const shows = state.shows.filter(s=>s.status==='watching' && s.seasonsLoaded);
  if(!shows.length){ toast('Nothing to check yet'); return; }
  toast(`Checking ${shows.length} show${shows.length>1?'s':''}…`);
  let newTotal = 0, errorTitles = [], movedBack = 0, capOnlyCount = 0;
  for(const show of shows){
    const result = await checkForNewEpisodesSafely(show);
    if(result.error) errorTitles.push(show.title);
    else {
      newTotal += result.newCount;
      if(result.capIncreased && result.newCount===0) capOnlyCount++;
      if(result.statusChanged && show.status==='watching') movedBack++;
    }
  }
  saveState();
  renderMain();
  if(errorTitles.length){
    toast(`Checked what I could — ${errorTitles.length} show${errorTitles.length>1?'s':''} couldn't be reached`);
  } else if(newTotal>0 || capOnlyCount>0){
    const parts = [];
    if(newTotal>0) parts.push(`${newTotal} new episode${newTotal>1?'s':''}`);
    if(capOnlyCount>0) parts.push(`${capOnlyCount} show${capOnlyCount>1?'s':''} now available`);
    toast(`Found ${parts.join(' · ')}${movedBack? ` · ${movedBack} moved back to Watching`:''}`);
  } else {
    toast('All caught up — no new episodes');
  }
}
function renderWatchingMyList(shows, main, headerHtml, totalUnfiltered){
  const active = sortShows(shows.filter(s=>nextUnwatched(s)));
  const caughtUp = sortShows(shows.filter(s=>!nextUnwatched(s)));
  let html = headerHtml;
  if(active.length===0 && caughtUp.length===0){
    html += (totalUnfiltered>0 && librarySearchQuery)
      ? `<div class="empty"><div class="big">·</div>No matches for "${escapeHtml(librarySearchQuery)}".</div>`
      : `<div class="empty"><div class="big">·</div>Nothing here yet.<br><span style="font-size:12px">Add a show, or</span><br><button type="button" onclick="openSearch()" style="margin-top:10px;background:var(--amber);color:#1a1204;border:none;padding:9px 18px;border-radius:20px;font-weight:700;font-size:13px;">Browse Discover</button></div>`;
    main.innerHTML = html;
    return;
  }
  if(active.length){
    html += `<div class="list-group">` + active.map(s=>listRowHtml(s, nextUnwatched(s))).join('') + `</div>`;
  }
  if(caughtUp.length){
    html += `<button type="button" onclick="toggleCaughtUpCollapsed()" style="width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;padding:6px 2px 8px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-family:'Inter';">
      <span>Caught up · waiting for new episodes (${caughtUp.length})</span>
      <span style="font-size:13px;">${caughtUpCollapsed?'▸':'▾'}</span>
    </button>`;
    if(!caughtUpCollapsed){
      html += `<div class="list-group">` + caughtUp.map(s=>listRowHtml(s, null, true)).join('') + `</div>`;
    }
  }
  main.innerHTML = html;
  enhanceWatchingRowsWithEpisodeNames(active);
}
function listRowHtml(show, nxt, dimmed){
  const remaining = remainingCount(show);
  let subText = nxt? `S${pad(nxt.season)}E${pad(nxt.number)}` : 'Caught up';
  if(nxt && remaining>1) subText += ` · +${remaining-1} more`;
  return `
    <div class="list-row" data-showid="${show.id}" style="${dimmed?'opacity:0.55;':''}">
      <div class="row-swipe-bg">
        <span class="swipe-label left">${nxt? '✓ Log':''}</span>
        <span class="swipe-label right">✕ Remove</span>
      </div>
      <div class="row-swipe-inner">
        <button class="rowmain" onclick="openDetail('${show.id}')">
          <div class="poster-wrap">
            ${posterDiv(show)}
            ${nxt && remaining>1? `<div class="count-badge">${remaining}</div>`:''}
          </div>
          <div class="rinfo">
            <h3>${escapeHtml(show.title)}</h3>
            <div class="rsub" data-rowsub="${show.id}">${subText}</div>
          </div>
        </button>
        ${nxt
          ? `<button class="check-btn" onclick="logNext('${show.id}')" title="Log next episode">✓</button>`
          : `<div class="check-btn done">✓</div>`}
      </div>
    </div>`;
}
// Fills in real episode titles once fetched, without delaying the initial paint above
async function enhanceWatchingRowsWithEpisodeNames(active){
  for(const s of active){
    if(currentTab!=='watching' || watchingSubview!=='mylist') return; // bail if the user navigated away
    try{
      const meta = await getEpisodeMeta(s);
      const nxt = nextUnwatched(s);
      if(!nxt) continue;
      const m = meta[`${nxt.season}-${nxt.number}`];
      const remaining = remainingCount(s);
      let text = `S${pad(nxt.season)}E${pad(nxt.number)}`;
      if(m && m.name) text += ` · ${escapeHtml(m.name)}`;
      if(remaining>1) text += ` · +${remaining-1} more`;
      const el = document.querySelector(`[data-rowsub="${s.id}"]`);
      if(el) el.innerHTML = text;
    }catch(e){}
  }
}
function setWatchingSubview(v){ watchingSubview = v; renderMain(); }
function toggleCaughtUpCollapsed(){ caughtUpCollapsed = !caughtUpCollapsed; renderMain(); }
async function renderUpcoming(shows, main, headerHtml){
  if(shows.length===0){
    main.innerHTML = headerHtml + `<div class="empty">Add shows to Watching to see what's airing next.</div>`;
    return;
  }
  const results = [];
  const BATCH_SIZE = 5; // small parallel batches — much faster than one-at-a-time, still polite to the APIs
  for(let i=0; i<shows.length; i+=BATCH_SIZE){
    const batch = shows.slice(i, i+BATCH_SIZE);
    const batchResults = await Promise.all(batch.map(s=>getUpcomingInfo(s)));
    batch.forEach((s,idx)=>{
      const info = batchResults[idx];
      if(info.airDate && !info.error) results.push({show:s, info});
    });
    // Only re-render if the user is still on this subview (they may have navigated away while awaiting)
    if(currentTab!=='watching' || watchingSubview!=='upcoming') return;
  }
  if(results.length===0){
    main.innerHTML = headerHtml + `<div class="empty">Nothing with a scheduled air date right now.</div>`;
    return;
  }
  results.sort((a,b)=> new Date(a.info.airDate).getTime() - new Date(b.info.airDate).getTime());
  main.innerHTML = headerHtml + results.map(r=>{
    const {show, info} = r;
    const when = info.hasTime? formatAirPST(info.airDate) : formatDateOnly(info.airDate);
    const right = `<div class="airtime">${when}</div>
      <div class="statustag">S${pad(info.season)}E${pad(info.episode)}${info.name? ' · '+escapeHtml(info.name):''}</div>`;
    return `
    <div class="upcoming-card">
      ${posterDiv(show)}
      <div class="info">
        <h3>${escapeHtml(show.title)}</h3>
        ${right}
      </div>
    </div>`;
  }).join('');
}
// Session-only cache (never persisted) — an air date/time doesn't need to be re-fetched every
// single time you flip to Upcoming; a few minutes old is still accurate, and it makes repeat
// visits within the same session feel instant.
const upcomingInfoCache = {};
const UPCOMING_CACHE_TTL = 5 * 60 * 1000; // 5 minutes
async function getUpcomingInfo(show){
  const cached = upcomingInfoCache[show.id];
  if(cached && (Date.now()-cached.at) < UPCOMING_CACHE_TTL) return cached.info;
  let info;
  try{
    if(show.source==='tvmaze'){
      const res = await pacedFetch(`https://api.tvmaze.com/shows/${show.externalId}?embed=nextepisode`);
      const data = await res.json();
      const next = data._embedded && data._embedded.nextepisode;
      info = next && next.airstamp
        ? { status:data.status, airDate:next.airstamp, season:next.season, episode:next.number, name:next.name, hasTime:true }
        : { status:data.status, airDate:null };
    } else {
      const key = tmdbKey();
      const res = await pacedFetch(`https://api.themoviedb.org/3/tv/${show.externalId}?api_key=${key}`);
      const data = await res.json();
      const next = data.next_episode_to_air;
      info = next && next.air_date
        ? { status:data.status, airDate:next.air_date, season:next.season_number, episode:next.episode_number, name:next.name, hasTime:false }
        : { status:data.status, airDate:null };
    }
  }catch(e){
    info = { status:null, airDate:null, error:true };
  }
  upcomingInfoCache[show.id] = { info, at: Date.now() };
  return info;
}
function formatAirPST(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleString('en-US', { timeZone:'America/Los_Angeles', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }) + ' PT';
  }catch(e){ return iso; }
}
function formatDateOnly(iso){
  try{
    const [y,m,d] = iso.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    return dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  }catch(e){ return iso; }
}

function renderLog(main){
  const perShow = [];
  state.shows.forEach(s=>{
    let watchedN=0, lastDate='';
    (s.seasons||[]).forEach(se=>se.episodes.forEach(ep=>{
      if(ep.watched){ watchedN++; if((ep.watchedDate||'') > lastDate) lastDate = ep.watchedDate||''; }
    }));
    if(watchedN>0) perShow.push({show:s, watchedN, lastDate});
  });
  perShow.sort((a,b)=> (b.lastDate||'').localeCompare(a.lastDate||''));
  if(perShow.length===0){
    main.innerHTML = `<div class="empty"><div class="big">·</div>No watch history logged yet.</div>`;
    return;
  }
  const totalEpisodes = perShow.reduce((sum,p)=>sum+p.watchedN,0);
  main.innerHTML = `<div class="section-label">All-time history · ${perShow.length} shows · ${totalEpisodes} episodes</div>` +
  `<div class="list-group">` + perShow.map(p=>{
    const sub = `${p.watchedN} episode${p.watchedN!==1?'s':''} watched · last ${p.lastDate? relativeDate(p.lastDate): 'unknown'}`;
    return libraryRowHtml(p.show, sub);
  }).join('') + `</div>`;
}

function pad(n){ return String(n).padStart(2,'0'); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function formatDate(d){ try{ return new Date(d).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}); }catch(e){ return d; } }
function relativeDate(d){
  try{
    const then = new Date(d+'T00:00:00');
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const days = Math.round((today - then) / 86400000);
    if(days<0) return formatDate(d); // future-dated watch entries — just show the date
    if(days===0) return 'today';
    if(days===1) return 'yesterday';
    if(days<7) return `${days} days ago`;
    if(days<60) return `${Math.floor(days/7)} week${Math.floor(days/7)!==1?'s':''} ago`;
    return formatDate(d);
  }catch(e){ return d; }
}

// iOS sometimes carries a tap through to a freshly-rendered input at the same screen
// position, focusing it (and popping the keyboard) even though we never called .focus().
// Force-releasing focus and re-pinning scroll after the browser settles fixes both.
function pinSheetToTop(){
  requestAnimationFrame(()=>{
    if(document.activeElement && document.activeElement.tagName==='INPUT') document.activeElement.blur();
    const body = document.querySelector('.sheet-body');

// Strips a trailing "(YYYY)" or "(US)"/"(UK)" etc. from titles like "Beauty and the Beast (2012)"
// or "Shameless (US)" — trackers add these to disambiguate remakes/regional versions, but show
// databases index the plain title. Unknown bracket content is left alone rather than guessed at.
const COUNTRY_ALIASES = { US:'US', UK:'GB', GB:'GB', AU:'AU', CA:'CA', NZ:'NZ', IE:'IE', FR:'FR', DE:'DE', JP:'JP', KR:'KR', IN:'IN' };
function stripYearSuffix(title){
  const m = title.match(/^(.*?)\s*[\(\[]([^()\[\]]{2,10})[\)\]]\s*$/);
  if(!m) return { clean: title.trim(), year: null, country: null };
  const inner = m[2].trim();
  if(/^(19|20)\d{2}$/.test(inner)) return { clean: m[1].trim(), year: inner, country: null };
  const code = COUNTRY_ALIASES[inner.toUpperCase()];
  if(code) return { clean: m[1].trim(), year: null, country: code };
  return { clean: title.trim(), year: null, country: null }; // unrecognized bracket — leave as-is
}
// When we know the intended year or country, put matching results first without discarding the rest.
function selectBestYearMatch(list, year, country){
  if(!list.length) return list;
  if(year){
    const exact = list.filter(s=> s.premiered && s.premiered.slice(0,4)===year);
    if(exact.length) return exact.concat(list.filter(s=>!exact.includes(s)));
  }
  if(country){
    const exact = list.filter(s=> s.country===country);
    if(exact.length) return exact.concat(list.filter(s=>!exact.includes(s)));
  }
  return list;
}
async function unifiedSearch(q){
  const {clean, year, country} = stripYearSuffix(q);
  let out = [];
  const key = tmdbKey();
  if(key){
    try{
      const res = await pacedFetch(`https://api.themoviedb.org/3/search/tv?api_key=${key}&query=${encodeURIComponent(clean)}`);
      const data = await res.json();
      if(data.results) out = data.results.map(mapTmdbShow);
    }catch(e){ /* fall through to TVmaze */ }
  }
  if(out.length < 5){
    try{
      const res2 = await pacedFetch('https://api.tvmaze.com/search/shows?q=' + encodeURIComponent(clean));
      const data2 = await res2.json();
      const existingNames = new Set(out.map(s=>s.name.toLowerCase()));
      const extra = (data2||[]).map(d=>mapTvmazeShow(d.show)).filter(s=>!existingNames.has(s.name.toLowerCase()));
      out = out.concat(extra);
    }catch(e){ /* ignore, TMDB results (if any) still stand */ }
  }
  return selectBestYearMatch(out, year, country);
}

    seasons: [], seasonsLoaded:false, addedAt: Date.now(), updatedAt: Date.now(), rating:0
  };
  state.shows.push(rec);
  saveState();
  switchTab(rec.status);
  toast(`Added "${show.name}" — mark anything you've already watched below`);
  openDetail(rec.id); // straight into the episode list, in case this isn't a fresh start for them
}

/* ---------------- EPISODES ---------------- */
async function ensureEpisodes(show){
  if(show.seasonsLoaded) return;
  try{
    if(show.source==='tmdb'){
      await loadTmdbEpisodes(show);
    } else {
      await loadTvmazeEpisodes(show);
    }
    show.seasonsLoaded = true;
    saveState();
  }catch(e){
    toast('Could not load episodes — try again in a moment');
  }
}
// For sources that only give a date (no time), assume a same-day premiere becomes available
// at 6pm Pacific — a reasonable default for US network/streaming drops, since the alternative
// (waiting until the next calendar day) is needlessly conservative.
function getPacificDateAndHour(){
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone:'America/Los_Angeles', year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', hour12:false
  }).formatToParts(now);
  const map = {};
  parts.forEach(p=> map[p.type]=p.value);
  let hour = parseInt(map.hour, 10);
  if(hour===24) hour = 0;
  return { dateStr: `${map.year}-${map.month}-${map.day}`, hour };
}
function hasAiredByDateOnly(dateStr){
  if(!dateStr) return false;
  const { dateStr: todayPacific, hour } = getPacificDateAndHour();
  if(dateStr < todayPacific) return true;
  if(dateStr === todayPacific) return hour >= 18; // 6pm Pacific
  return false;
}
async function loadTvmazeEpisodes(show){
  const res = await pacedFetch(`https://api.tvmaze.com/shows/${show.externalId}?embed=episodes`);
  const data = await res.json();
  if(data.runtime || data.averageRuntime) show.runtime = data.runtime || data.averageRuntime;
  const nowMs = Date.now();
  const bySeason = {};
  const airedThroughBySeason = {};
  (data._embedded && data._embedded.episodes || []).forEach(ep=>{
    if(ep.season===0) return; // skip specials
    if(!bySeason[ep.season]) bySeason[ep.season]=[];
    bySeason[ep.season].push({ number:ep.number, watched:false, watchedDate:null });
    // Prefer the exact broadcast timestamp when TVmaze provides one — this correctly
    // handles same-day episodes (e.g. airs tonight at 6pm, not available this morning).
    let hasAired = false;
    if(ep.airstamp){
      hasAired = new Date(ep.airstamp).getTime() <= nowMs;
    } else if(ep.airdate){
      hasAired = hasAiredByDateOnly(ep.airdate);
    }
    if(hasAired) airedThroughBySeason[ep.season] = Math.max(airedThroughBySeason[ep.season]||0, ep.number);
  });
  show.seasons = Object.keys(bySeason).sort((a,b)=>a-b).map(n=>({number:Number(n), episodes:bySeason[n], airedThrough: airedThroughBySeason[n]||0}));
  show.lifecycleStatus = data.status || null; // Running / Ended / To Be Determined / In Development
}
// TMDB has no time-of-day data at all. When a show also exists on TVmaze (common —
// many shows are indexed by both), borrow its broadcast timestamps just for precise
// episode-unlock timing, without changing where the show's main listing comes from.
async function loadTmdbEpisodes(show){
  const key = tmdbKey();
  const detailRes = await pacedFetch(`https://api.themoviedb.org/3/tv/${show.externalId}?api_key=${key}`);
  const detail = await detailRes.json();
  if(detail.episode_run_time && detail.episode_run_time.length){
    show.runtime = detail.episode_run_time[0]; // real per-episode runtime, replacing the placeholder used at add-time
  }
  const seasonNums = (detail.seasons||[]).map(s=>s.season_number).filter(n=>n>0);
  const seasons = [];
  for(const sn of seasonNums){
    const sres = await pacedFetch(`https://api.themoviedb.org/3/tv/${show.externalId}/season/${sn}?api_key=${key}`);
    const sdata = await sres.json();
    let airedThrough = 0;
    const episodes = (sdata.episodes||[]).map(ep=>{
      // TMDB has no time-of-day data at all, so we use the reliable date-only rule (with the
      // 6pm-Pacific same-day assumption) for every TMDB-sourced show. A cross-reference to
      // TVmaze for exact broadcast times used to run here, but for common multi-country titles
      // (Big Brother, Love Island, etc.) it could silently match the wrong regional version and
      // feed in wrong timing data that never advances — worse than just not having exact times.
      const hasAired = hasAiredByDateOnly(ep.air_date);
      if(hasAired) airedThrough = Math.max(airedThrough, ep.episode_number);
      return { number: ep.episode_number, watched:false, watchedDate:null };
    });
    seasons.push({ number: sn, episodes, airedThrough });
    await sleep(150);
  }
  show.seasons = seasons.sort((a,b)=>a.number-b.number);
  show.lifecycleStatus = detail.status || null; // Returning Series / Ended / Canceled / etc.
}

/* ---------------- EPISODE METADATA CACHE (session-only, never persisted) ---------------- */
// Names and air dates are intentionally NOT stored in `state` to keep local storage small.
// They're fetched on demand and kept only in memory for the current session.
const episodeMetaCache = {};
async function getEpisodeMeta(show){
  if(episodeMetaCache[show.id]) return episodeMetaCache[show.id];
  const meta = {}; // "season-episode" -> {name, airdate}
  try{
    if(show.source==='tmdb'){
      const key = tmdbKey();
      const detailRes = await pacedFetch(`https://api.themoviedb.org/3/tv/${show.externalId}?api_key=${key}`);
      const detail = await detailRes.json();
      const seasonNums = (detail.seasons||[]).map(s=>s.season_number).filter(n=>n>0);
      for(const sn of seasonNums){
        const sres = await pacedFetch(`https://api.themoviedb.org/3/tv/${show.externalId}/season/${sn}?api_key=${key}`);
        const sdata = await sres.json();
        (sdata.episodes||[]).forEach(ep=>{ meta[`${sn}-${ep.episode_number}`] = {name:ep.name, airdate:ep.air_date}; });
        await sleep(120);
      }
    } else {
      const res = await pacedFetch(`https://api.tvmaze.com/shows/${show.externalId}?embed=episodes`);
      const data = await res.json();
      (data._embedded && data._embedded.episodes || []).forEach(ep=>{
        if(ep.season===0) return;
        meta[`${ep.season}-${ep.number}`] = {name:ep.name, airdate:ep.airdate};
      });
    }
  }catch(e){ /* fall back to generic labels below */ }
  episodeMetaCache[show.id] = meta;
  return meta;
}

/* ---------------- WHERE TO WATCH (session-only, never persisted) ---------------- */
// Same principle as episode metadata above: fetched live when a show is opened,
// kept only in memory for the session, never written to local storage.
const providerCache = {};
async function getWhereToWatch(show){
  if(providerCache[show.id]) return providerCache[show.id];
  let result = { providers: [], fallbackText: null };
  try{
    if(show.source==='tmdb'){
      const key = tmdbKey();
      if(key){
        const res = await pacedFetch(`https://api.themoviedb.org/3/tv/${show.externalId}/watch/providers?api_key=${key}`);
        const data = await res.json();
        const us = data.results && data.results.US;
        const list = (us && (us.flatrate || us.free || us.ads)) || [];
        result.providers = list.slice(0,6).map(p=>({
          name: p.provider_name,
          logo: p.logo_path? `https://image.tmdb.org/t/p/w45${p.logo_path}` : null
        }));
      }
    } else if(show.network){
      result.fallbackText = `Originally aired on ${show.network}`;
    }
  }catch(e){ /* leave empty — rendered as "couldn't check" below */ }
  providerCache[show.id] = result;
  return result;
}
function whereToWatchHtml(info){
  if(!info) return `<div class="statustag">Loading…</div>`;
  if(info.providers && info.providers.length){
    return `<div class="provider-row">` + info.providers.map(p=>`
      <div class="provider-chip">${p.logo?`<img src="${p.logo}" alt="">`:''}<span>${escapeHtml(p.name)}</span></div>`).join('') + `</div>`;
  }
  if(info.fallbackText) return `<div class="statustag">${escapeHtml(info.fallbackText)}</div>`;
  return `<div class="statustag">Nothing found for the US — availability data may be limited for this show.</div>`;
}

// "More Like This" — session-only, never persisted, same principle as Where to Watch above.
const recommendCache = {};
async function getRecommendations(show){
  if(recommendCache[show.id]) return recommendCache[show.id];
  let list = [];
  try{
    if(show.source==='tmdb'){
      const key = tmdbKey();
      if(key){
        const res = await pacedFetch(`https://api.themoviedb.org/3/tv/${show.externalId}/recommendations?api_key=${key}`);
        const data = await res.json();
        list = (data.results||[]).slice(0,10).map(mapTmdbShow).filter(s=>!isInLibrary(s));
      }
    }
    // TVmaze has no equivalent recommendations endpoint — this section just won't show for those shows.
  }catch(e){ /* leave empty, section simply won't render */ }
  recommendCache[show.id] = list;
  return list;
}
function moreLikeThisHtml(list){
  if(!list || !list.length) return '';
  return `
    <label class="field-label">More Like This</label>
    <div class="discover-row">
      ${list.map(s=>`
        <button class="discover-thumb" onclick='pickShow(${JSON.stringify(s).replace(/'/g,"&#39;")})'>
          <div class="poster-wrap"><div class="poster" style="${s.image?`background-image:url('${s.image}')`:''}">${s.image?'':'No Art'}</div></div>
          <div class="dtitle">${escapeHtml(s.name)}</div>
        </button>`).join('')}
    </div>`;
}

async function logNext(showId){
  const show = state.shows.find(s=>s.id===showId);
  await ensureEpisodes(show);
  const next = nextUnwatched(show);
  if(!next){ toast('All caught up!'); return; }
  const se = show.seasons.find(s=>s.number===next.season);
  const ep = se.episodes.find(e=>e.number===next.number);
  ep.watched = true;
  ep.watchedDate = new Date().toISOString().slice(0,10);
  show.updatedAt = Date.now();
  applyAutoCompleteLogic(show);
  saveState();
  renderMain();
  toast(`Logged S${pad(se.number)}E${pad(ep.number)}`);
}
function applyAutoCompleteLogic(show){
  const {w,t} = watchedCount(show);
  const hasEnded = show.lifecycleStatus && /ended|canceled|cancelled/i.test(show.lifecycleStatus);
  const fullyDone = t>0 && w===t && hasEnded;
  if(fullyDone){
    show.status = 'completed';
  } else if(show.status==='completed' && !fullyDone){
    show.status = 'watching'; // was marked done, but no longer qualifies (new episodes, or lifecycle data changed)
  }
}
// season attach for logNext lookup (episodes need season number reference)
function nextUnwatched(show){
  for(const se of (show.seasons||[])){
    if(se.skipped) continue;
    const cap = seasonCap(se);
    for(const ep of se.episodes){
      if(ep.number>cap) continue; // not aired yet
      if(!ep.watched) return {...ep, season: se.number};
    }
  }
  return null;
}

async function openDetail(showId){
  const show = state.shows.find(s=>s.id===showId);
  openSheet(`
    <div class="handle"></div>
    <div class="sheet-head"><h2>Details</h2><button onclick="closeSheet()">Done</button></div>
    <div class="sheet-body" id="detailBody">
      <div style="text-align:center;padding:30px;"><span class="spinner"></span></div>
    </div>
  `);
  await ensureEpisodes(show);
  const meta = await getEpisodeMeta(show);
  renderDetailBody(show, meta);
  pinSheetToTop();
  if(!providerCache[show.id]){
    getWhereToWatch(show).then(info=>{
      const el = document.getElementById(`whereToWatch-${show.id}`);
      if(el) el.innerHTML = whereToWatchHtml(info);
    });
  }
  if(!recommendCache[show.id]){
    getRecommendations(show).then(list=>{
      const el = document.getElementById(`moreLikeThis-${show.id}`);
      if(el) el.outerHTML = list.length? `<div id="moreLikeThis-${show.id}">${moreLikeThisHtml(list)}</div>` : `<div id="moreLikeThis-${show.id}"></div>`;
    });
  }
}
function renderDetailBody(show, meta){
  meta = meta || episodeMetaCache[show.id] || {};
  const {w,t} = watchedCount(show);
  const nxtForExpand = nextUnwatched(show);
  const body = document.getElementById('detailBody');
  if(!body) return;
  const isStale = show.seasonsLoaded && show.seasons.some(se=> se.airedThrough==null);
  body.innerHTML = `
    <div class="detail-hero">
      ${posterDiv(show)}
      <div>
        <h2>${escapeHtml(show.title)}</h2>
        <div class="meta">${show.premiered? show.premiered.slice(0,4):''} · ${show.network||''} <span class="src-tag">${show.source==='tmdb'?'TMDB':'TVmaze'}</span></div>
        <div class="meta">${w}/${t} episodes watched</div>
      </div>
    </div>
    ${isStale? `<div class="stale-banner">This show's episode data predates some recent fixes (like unaired-episode detection). <button type="button" onclick="refreshEpisodes('${show.id}')">Refresh now</button></div>`:''}
    <label class="field-label">Where to Watch</label>
    <div id="whereToWatch-${show.id}">${whereToWatchHtml(providerCache[show.id])}</div>
    <div id="moreLikeThis-${show.id}">${moreLikeThisHtml(recommendCache[show.id])}</div>
    <label class="field-label">Status</label>
    <div class="status-row">
      ${['watching','later','want','completed','stopped'].map(st=>`<button type="button" class="status-chip ${show.status===st?'sel':''}" onclick="setStatus('${show.id}','${st}')">${label(st)}</button>`).join('')}
    </div>
    <button class="btn ghost" style="width:100%;margin-top:10px" onclick="refreshEpisodes('${show.id}')">Check for new episodes</button>
    <label class="field-label">Your rating</label>
    <div class="rating-row">
      ${[1,2,3,4,5].map(n=>`<button class="${show.rating>=n?'on':''}" onclick="setRating('${show.id}',${n})">★</button>`).join('')}
    </div>
    ${show.seasons.length===0? '<div class="empty">No episode data available.</div>' :
      show.seasons.map(se=>{
        const cap = seasonCap(se);
        const eligible = se.episodes.filter(ep=>ep.number<=cap);
        const seasonAllWatched = eligible.length>0 && eligible.every(ep=>ep.watched);
        const expanded = isSeasonExpanded(show, se, nxtForExpand);
        return `
        <div class="season-block">
          <button type="button" class="season-toggle" onclick="toggleSeasonExpanded('${show.id}',${se.number})">
            <h4>Season ${se.number}${se.skipped? ' <span class="badge-tbd">Skipped</span>':''}</h4>
            <span class="season-chevron">${expanded?'▾':'▸'}</span>
          </button>
          <div style="display:flex;gap:6px;margin:6px 0 8px;flex-wrap:wrap;">
            <button type="button" class="btn ghost" style="padding:6px 10px;font-size:11px;flex:none;" onclick="markSeasonWatched('${show.id}',${se.number})" ${eligible.length===0?'disabled':''}>${seasonAllWatched?'Unmark all':'Mark all watched'}</button>
            <button type="button" class="btn ghost" style="padding:6px 10px;font-size:11px;flex:none;" onclick="toggleSeasonSkip('${show.id}',${se.number})">${se.skipped?'Unskip':'Skip'}</button>
          </div>
          ${se.skipped? '<div class="statustag" style="margin-bottom:8px;">Excluded from your episode counts.</div>':''}
          ${!expanded? '' : se.episodes.map(ep=>{
            const m = meta[`${se.number}-${ep.number}`];
            const epName = m? m.name : null;
            const airdate = m? m.airdate : null;
            const hasAired = ep.number<=cap;
            if(!hasAired){
              return `
              <button type="button" class="ep-row" style="opacity:0.5;" onclick="toggleEpOverride('${show.id}',${se.number},${ep.number})">
                <div class="check ${ep.watched?'done':''}">${ep.watched?'✓':''}</div>
                <div class="etext">
                  <div class="t1">${escapeHtml(epName||'Episode '+ep.number)}</div>
                  <div class="t2">S${pad(se.number)}E${pad(ep.number)} ${airdate? '· airs '+formatDateOnly(airdate):'· not yet aired'}</div>
                </div>
              </button>`;
            }
            return `
            <button type="button" class="ep-row" onclick="toggleEp('${show.id}',${se.number},${ep.number})">
              <div class="check ${ep.watched?'done':''}">${ep.watched?'✓':''}</div>
              <div class="etext">
                <div class="t1">${escapeHtml(epName||'Episode '+ep.number)}</div>
                <div class="t2">S${pad(se.number)}E${pad(ep.number)} ${airdate? '· '+airdate:''}</div>
              </div>
            </button>`;
          }).join('')}
        </div>`;
      }).join('')
    }
    <button class="btn danger" style="width:100%;margin-top:20px" onclick="removeShow('${show.id}')">Remove from library</button>
  `;
}
// Tracks which seasons are expanded per show, in-memory only (resets on reload).
// The first time a show is opened, only the season with the next unwatched episode
// starts expanded — everything else starts collapsed so long-running shows are easy to scan.
let expandedSeasons = {};
function isSeasonExpanded(show, se, nxt){
  const key = `${show.id}-${se.number}`;
  if(!(key in expandedSeasons)){
    expandedSeasons[key] = !!(nxt && nxt.season===se.number);
  }
  return expandedSeasons[key];
}
function toggleSeasonExpanded(showId, seasonNum){
  const key = `${showId}-${seasonNum}`;
  expandedSeasons[key] = !expandedSeasons[key];
  const show = state.shows.find(s=>s.id===showId);
  renderDetailBody(show, episodeMetaCache[show.id]);
}
function markSeasonWatched(showId, seasonNum){
  const show = state.shows.find(s=>s.id===showId);
  const se = show.seasons.find(s=>s.number===seasonNum);
  const cap = seasonCap(se);
  const eligible = se.episodes.filter(ep=>ep.number<=cap);
  if(!eligible.length) return;
  const allWatched = eligible.every(ep=>ep.watched);
  const todayStr = new Date().toISOString().slice(0,10);
  eligible.forEach(ep=>{
    ep.watched = !allWatched;
    ep.watchedDate = ep.watched? todayStr : null;
  });
  show.updatedAt = Date.now();
  applyAutoCompleteLogic(show);
  saveState();
  renderDetailBody(show, episodeMetaCache[show.id]);
  renderMain();
}
function toggleSeasonSkip(showId, seasonNum){
  const show = state.shows.find(s=>s.id===showId);
  const se = show.seasons.find(s=>s.number===seasonNum);
  se.skipped = !se.skipped;
  show.updatedAt = Date.now();
  applyAutoCompleteLogic(show);
  saveState();
  renderDetailBody(show, episodeMetaCache[show.id]);
  renderMain();
}
function setStatus(id, st){
  const show = state.shows.find(s=>s.id===id);
  show.status = st; show.updatedAt = Date.now();
  saveState(); renderDetailBody(show); renderMain();
}
function setRating(id, n){
  const show = state.shows.find(s=>s.id===id);
  show.rating = (show.rating===n)? 0 : n;
  saveState(); renderDetailBody(show);
}
function toggleEp(id, seasonNum, epNum){
  const show = state.shows.find(s=>s.id===id);
  const se = show.seasons.find(s=>s.number===seasonNum);
  const ep = se.episodes.find(e=>e.number===epNum);
  ep.watched = !ep.watched;
  ep.watchedDate = ep.watched? new Date().toISOString().slice(0,10) : null;
  show.updatedAt = Date.now();
  applyAutoCompleteLogic(show);
  saveState(); renderDetailBody(show); renderMain();
}
// For an episode our data doesn't yet show as aired — mainly relevant for fast-moving shows
// (daily reality TV especially) where the source database lags behind real broadcasts. Confirms
// once, then marks it watched and nudges the season's aired-through count to match, so this
// episode and anything before it stop showing as locked too.
function toggleEpOverride(id, seasonNum, epNum){
  if(!confirm("Our data doesn't show this episode as aired yet — this can happen for shows that air very frequently. Mark it watched anyway?")) return;
  const show = state.shows.find(s=>s.id===id);
  const se = show.seasons.find(s=>s.number===seasonNum);
  const ep = se.episodes.find(e=>e.number===epNum);
  ep.watched = true;
  ep.watchedDate = new Date().toISOString().slice(0,10);
  se.airedThrough = Math.max(se.airedThrough||0, epNum);
  show.updatedAt = Date.now();
  applyAutoCompleteLogic(show);
  saveState(); renderDetailBody(show); renderMain();
}
// Checks for new episodes WITHOUT ever touching existing episode data. Fetches fresh data into
// a throwaway object (so the loader functions never mutate the real show), then only ADDS
// genuinely new seasons/episodes and only ever RAISES each season's aired-through count.
// Nothing that already exists is ever replaced or overwritten — there's no merge step left
// that could accidentally reset a watched flag, which is what the old approach was doing.
async function checkForNewEpisodesSafely(show){
  const temp = { externalId: show.externalId, source: show.source, title: show.title, premiered: show.premiered, seasons: [] };
  try{
    if(show.source==='tmdb') await loadTmdbEpisodes(temp);
    else await loadTvmazeEpisodes(temp);
  }catch(e){
    return { newCount:0, statusChanged:false, capIncreased:false, error:true };
  }
  if(temp.runtime) show.runtime = temp.runtime;
  if(temp.lifecycleStatus) show.lifecycleStatus = temp.lifecycleStatus;

  let newCount = 0;
  let capIncreased = false;
  (temp.seasons||[]).forEach(freshSe=>{
    let existingSe = show.seasons.find(se=>se.number===freshSe.number);
    if(!existingSe){
      existingSe = { number: freshSe.number, episodes: [], airedThrough: 0 };
      show.seasons.push(existingSe);
    }
    if((freshSe.airedThrough||0) > (existingSe.airedThrough||0)){
      existingSe.airedThrough = freshSe.airedThrough;
      capIncreased = true; // more episodes became available even though none are brand-new entries
    }
    freshSe.episodes.forEach(freshEp=>{
      const alreadyHave = existingSe.episodes.find(e=>e.number===freshEp.number);
      if(!alreadyHave){
        existingSe.episodes.push({ number: freshEp.number, watched:false, watchedDate:null });
        newCount++;
      }
    });
    existingSe.episodes.sort((a,b)=>a.number-b.number);
  });
  show.seasons.sort((a,b)=>a.number-b.number);
  delete episodeMetaCache[show.id];
  const prevStatus = show.status;
  applyAutoCompleteLogic(show);
  return { newCount, statusChanged: prevStatus!==show.status, capIncreased, error:false };
}
async function refreshEpisodes(id){
  const show = state.shows.find(s=>s.id===id);
  const body = document.getElementById('detailBody');
  if(body) body.insertAdjacentHTML('afterbegin', `<div style="text-align:center;padding:10px;"><span class="spinner"></span> <span style="font-size:12px;color:var(--muted)">Checking for new episodes…</span></div>`);
  const result = await checkForNewEpisodesSafely(show);
  if(result.error){
    toast("Couldn't check right now — try again in a moment");
  } else if(result.statusChanged && show.status==='watching'){
    toast('New episodes available — moved back to Watching');
  } else if(result.newCount>0){
    toast(`${result.newCount} new episode${result.newCount>1?'s':''} found`);
  } else if(result.capIncreased){
    toast('Newly aired episodes are now available');
  } else {
    toast('No new episodes yet');
  }
  saveState();
  const meta = await getEpisodeMeta(show);
  renderDetailBody(show, meta);
  renderMain();
}
let lastRemoved = null; // {show, index} — lets a removal be undone briefly after the fact
function removeShow(id){
  const idx = state.shows.findIndex(s=>s.id===id);
  if(idx===-1) return;
  const show = state.shows[idx];
  state.shows.splice(idx, 1);
  saveState();
  closeSheet();
  renderMain();
  lastRemoved = { show, idx };
  showUndoToast(`Removed "${show.title}"`);
}

function computeRecapStats(){
  const year = new Date().getFullYear();
  let episodesThisYear=0, minutesThisYear=0;
  const perShowCount = {};
  const genreCount = {};
  const showsWatchedThisYear = new Set();
  state.shows.forEach(s=>{
    (s.seasons||[]).forEach(se=>se.episodes.forEach(ep=>{
      if(ep.watched && ep.watchedDate && ep.watchedDate.slice(0,4)===String(year)){
        episodesThisYear++;
        minutesThisYear += (s.runtime||42);
        perShowCount[s.id] = (perShowCount[s.id]||0)+1;
        showsWatchedThisYear.add(s.id);
        (s.genres||[]).forEach(g=> genreCount[g] = (genreCount[g]||0)+1);
      }
    }));
  });
  const totalHours = Math.floor(minutesThisYear/60);
  const timeLabel = formatWatchTime(totalHours);
  const topShowId = Object.keys(perShowCount).sort((a,b)=>perShowCount[b]-perShowCount[a])[0];
  const topShow = topShowId? state.shows.find(s=>s.id===topShowId) : null;
  const topGenres = Object.keys(genreCount).sort((a,b)=>genreCount[b]-genreCount[a]).slice(0,5);
  const distinctShows = showsWatchedThisYear.size;
  return { year, episodesThisYear, timeLabel, topShow, topShowCount: topShowId?perShowCount[topShowId]:0, topGenres, distinctShows };
}

async function shareRecapCard(){

let _importRows = [];
function handleImportFile(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    let rows = [];
    if(file.name.toLowerCase().endsWith('.json')){
      try{
        const data = JSON.parse(reader.result);
        const arr = Array.isArray(data)? data : (data.shows || data.episodes || data.history || []);
        rows = arr.map(flattenRecord);
      }catch(e){ toast('Could not parse JSON'); return; }
    } else {
      rows = parseCSV(reader.result);
    }
    if(!rows.length){ toast('No rows found in file'); return; }
    _importRows = rows;
    showImportMapping(rows);
  };
  reader.readAsText(file);
}
function flattenRecord(r){
  // best-effort flatten of nested json record shapes
  const out = {...r};
  if(r.series_name) out.show = r.series_name;
  if(r.season_number!=null) out.season = r.season_number;
  if(r.episode_number!=null) out.episode = r.episode_number;
  if(r.watched_at) out.date = r.watched_at;
  return out;
}
function parseCSV(text){
  const lines = text.replace(/\r/g,'').split('\n').filter(l=>l.trim().length);
  if(!lines.length) return [];
  const headers = splitCsvLine(lines[0]);
  return lines.slice(1).map(line=>{
    const vals = splitCsvLine(line);
    const obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = (vals[i]||'').trim());
    return obj;
  });
}
function splitCsvLine(line){
  const out = []; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c==='"'){ inQ = !inQ; continue; }
    if(c===',' && !inQ){ out.push(cur); cur=''; continue; }
    cur+=c;
  }
  out.push(cur);
  return out;
}
function guessColumn(headers, keywords){
  const lower = headers.map(h=>h.toLowerCase());
  for(const kw of keywords){
    const idx = lower.findIndex(h=>h.includes(kw));
    if(idx>-1) return headers[idx];
  }
  return headers[0];
}
function showImportMapping(rows){
  const headers = Object.keys(rows[0]);
  const guessShow = guessColumn(headers, ['show','series','title']);
  const guessSeason = guessColumn(headers, ['season']);
  const guessEp = guessColumn(headers, ['episode_number','episode']);
  const guessDate = guessColumn(headers, ['watched_date','date','watched_at']);
  const opts = headers.map(h=>`<option value="${h}">${h}</option>`).join('');
  document.getElementById('importArea').innerHTML = `
    <div class="import-step">
      <p style="font-size:12px;color:var(--muted)">${rows.length} rows found. Confirm which columns map to what:</p>
      <div class="map-row"><label>Show title</label><select id="mapShow">${opts}</select></div>
      <div class="map-row"><label>Season #</label><select id="mapSeason">${opts}</select></div>
      <div class="map-row"><label>Episode #</label><select id="mapEp">${opts}</select></div>
      <div class="map-row"><label>Watched date</label><select id="mapDate">${opts}</select></div>
      <button class="btn primary" style="width:100%;margin-top:10px" onclick="runImport()">Start Import</button>
      <div id="importLog" class="import-log" style="display:none"></div>
    </div>
  `;

  document.getElementById('mapSeason').value = guessSeason;
  document.getElementById('mapEp').value = guessEp;
  document.getElementById('mapDate').value = guessDate;
